name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install libsystemd-dev
        run: sudo apt-get update && sudo apt-get install -y libsystemd-dev

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build engine (linuxX64 + linuxArm64)
        run: ./gradlew :engine:build

      - name: Link integration-tests binary (linuxX64)
        run: ./gradlew :integration-tests:linkDebugTestLinuxX64
