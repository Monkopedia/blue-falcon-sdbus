name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # so GITHUB_TOKEN can create a GitHub Release
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches gradle.properties version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          EXPECTED="${TAG#v}"
          ACTUAL=$(grep '^version=' gradle.properties | cut -d= -f2)
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::Tag $TAG expects version '$EXPECTED' but gradle.properties has '$ACTUAL'"
            exit 1
          fi
          echo "Version check OK: $ACTUAL"

      - name: Verify CHANGELOG has a released entry for this version
        run: |
          set -euo pipefail
          VERSION=$(grep '^version=' gradle.properties | cut -d= -f2)
          if ! grep -qE "^## \[${VERSION}\] - [0-9]{4}-[0-9]{2}-[0-9]{2}" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no dated '## [${VERSION}] - YYYY-MM-DD' entry"
            exit 1
          fi
          echo "Changelog entry present for $VERSION"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install libsystemd-dev
        run: sudo apt-get update && sudo apt-get install -y libsystemd-dev

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew :engine:publishToMavenCentral

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          # Extract the CHANGELOG block for this version (everything between
          # `## [VERSION] - …` and the next `## […]` heading).
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { flag = 1; next }
            flag && /^## \[/        { exit }
            flag                     { print }
          ' CHANGELOG.md > release-notes.md
          # Prepend Maven coordinates so the Release page has a copy-pastable
          # install snippet at the top.
          {
            echo "\`\`\`kotlin"
            echo "implementation(\"com.monkopedia:blue-falcon-sdbus:${VERSION}\")"
            echo "\`\`\`"
            echo
            cat release-notes.md
          } > release-notes-final.md
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --notes-file release-notes-final.md
